name: Deploy Frontend To Netlify

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-netlify.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      DEMO_EMAIL: ${{ secrets.DEMO_EMAIL }}
      DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend with API URL
        working-directory: frontend
        run: |
          API_BASE_URL="$(printf '%s' "${VITE_API_BASE_URL}" | tr -d '\r\n' | sed -e 's/^"//' -e 's/"$//' )"
          API_BASE_URL="$(printf '%s' "${API_BASE_URL}" | tr -cd '[:print:]')"
          API_BASE_URL="$(printf '%s' "${API_BASE_URL}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          echo "VITE_API_BASE_URL=${API_BASE_URL}" >> .env
          echo "VITE_ENABLE_REGISTER=false" >> .env
          npm run build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        working-directory: frontend
        run: netlify deploy --prod --dir=dist --site="$NETLIFY_SITE_ID"

      - name: Verify backend health
        run: |
          if [ -z "${VITE_API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL not set; skipping backend checks"
            exit 0
          fi
          # Sanitize the value: remove CR/newline, surrounding quotes, non-printables, and trim whitespace
          API_BASE_URL="$(printf '%s' "${VITE_API_BASE_URL}" | tr -d '\r\n' | sed -e 's/^"//' -e 's/"$//' )"
          API_BASE_URL="$(printf '%s' "${API_BASE_URL}" | tr -cd '[:print:]')"
          API_BASE_URL="$(printf '%s' "${API_BASE_URL}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [ -z "${API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL empty after sanitization; skipping backend checks"
            exit 0
          fi

          # Basic validation: require http:// or https:// to avoid malformed-URL errors
          if ! printf '%s' "${API_BASE_URL}" | grep -Eq '^https?://'; then
            echo "VITE_API_BASE_URL does not start with http:// or https://; skipping backend checks"
            exit 0
          fi

          # Use --url for clarity and call health endpoint
          curl -fsS --url "${API_BASE_URL}/health"

      - name: Test demo login
        run: |
          if [ -z "${DEMO_EMAIL}" ] || [ -z "${DEMO_PASSWORD}" ]; then
            echo "Demo credentials not provided; skipping login test"
            exit 0
          fi

          API_BASE_URL="$(printf '%s' "${VITE_API_BASE_URL}" | tr -d '\r\n' | sed -e 's/^"//' -e 's/"$//' )"
          API_BASE_URL="$(printf '%s' "${API_BASE_URL}" | tr -cd '[:print:]')"
          API_BASE_URL="$(printf '%s' "${API_BASE_URL}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"

          if [ -z "${API_BASE_URL}" ]; then
            echo "VITE_API_BASE_URL empty after sanitization; skipping login test"
            exit 0
          fi

          if ! printf '%s' "${API_BASE_URL}" | grep -Eq '^https?://'; then
            echo "VITE_API_BASE_URL does not start with http:// or https://; skipping login test"
            exit 0
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${API_BASE_URL}/auth/jwt/login" -H 'Content-Type: application/x-www-form-urlencoded' --data "username=${DEMO_EMAIL}&password=${DEMO_PASSWORD}")
          echo "Login returned $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
