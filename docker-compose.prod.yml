version: "3.8"
services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: apptracker
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: supersecret
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d apptracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/amirabal0224/application-track-backend:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://appuser:supersecret@db:5432/apptracker
      SECRET_KEY: "CHANGE_ME_REPLACE"
      CORS_ORIGINS: "https://your-site.netlify.app"
      ENABLE_REGISTRATION: "false"
      DEMO_EMAIL: "demo@apptrack.dev"
      DEMO_PASSWORD: "ChangeMeDemo123!"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: ghcr.io/amirabal0224/application-track-frontend:latest
    restart: always
    environment:
      # Note: For production Docker Compose, the frontend is already built with VITE_API_BASE_URL.
      # If using a dynamic API_BASE_URL, rebuild the image with --build-arg VITE_API_BASE_URL=...
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  db-data:
